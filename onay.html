<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b12" />
<title>Ders Devri Onayı · Bilnet Balıkesir BT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" />
<style>
  :root {
    --bg: #0a0b12;
    --surface: #14161f;
    --surface-2: #1b1e29;
    --line: #262a38;
    --text: #f0f2f7;
    --muted: #868ca3;
    --faint: #4f5567;
    --accent: #fbbf24;
    --ok: #34d399;
    --err: #f87171;
    --font-display: 'Instrument Serif', serif;
    --font-body: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    background-image: radial-gradient(900px 500px at 50% 0%, rgba(251, 191, 36, 0.08), transparent 65%);
  }
  .box {
    width: 100%;
    max-width: 480px;
    background: linear-gradient(180deg, var(--surface), var(--surface-2));
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 32px 28px 28px;
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.6);
    animation: rise 400ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 14px;
  }
  .headline {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(28px, 6vw, 40px);
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin: 0 0 14px;
  }
  .headline em { font-style: normal; font-family: var(--font-body); font-weight: 800; color: var(--accent); }

  .detail {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    margin: 18px 0;
    display: grid;
    gap: 4px;
  }
  .detail .r {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 5px 0;
    font-family: var(--font-mono);
    font-size: 13px;
    border-top: 1px dashed rgba(255,255,255,0.06);
  }
  .detail .r:first-child { border-top: 0; }
  .detail .l { color: var(--muted); letter-spacing: 0.04em; }
  .detail .v { color: var(--text); font-weight: 500; text-align: right; }
  .detail .v.big { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }

  .message {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
    margin: 14px 0 20px;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 18px;
  }
  .btn {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid transparent;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.005em;
    cursor: pointer;
    transition: transform 120ms, filter 160ms, opacity 200ms;
    min-height: 52px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.55; cursor: wait; }
  .btn-approve { background: var(--ok); color: #042416; }
  .btn-reject { background: transparent; color: var(--err); border-color: var(--err); }

  .footer-note {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--faint);
    text-align: center;
    margin-top: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .status-card {
    text-align: center;
    padding: 24px;
  }
  .status-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: grid;
    place-items: center;
    font-size: 28px;
    font-weight: 700;
  }
  .status-icon.ok  { background: var(--ok); color: #042416; }
  .status-icon.err { background: var(--err); color: #200707; }
  .status-icon.pending { background: rgba(251, 191, 36, 0.2); color: var(--accent); border: 1px solid var(--accent); }

  @media (max-width: 420px) {
    .box { padding: 24px 20px 22px; border-radius: 16px; }
    .btn-row { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="eyebrow" id="eyebrow">Ders Devri · Onay</div>
  <div id="content">
    <div class="status-card">
      <div class="status-icon pending">…</div>
      <div style="color:var(--muted);font-size:13px;">Yükleniyor</div>
    </div>
  </div>
</div>

<script>
(function () {
  const GUN_AD = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
  const AY_AD  = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

  const params = new URLSearchParams(location.search);
  const token = params.get("token");
  const autoDecision = params.get("d");  // "approve" | "reject" from email buttons

  const content = document.getElementById("content");

  function el(tag, opts, ...children) {
    const e = document.createElement(tag);
    if (opts) {
      if (opts.className) e.className = opts.className;
      if (opts.text != null) e.textContent = opts.text;
      if (opts.attrs) for (const k in opts.attrs) e.setAttribute(k, opts.attrs[k]);
      if (opts.on) for (const k in opts.on) e.addEventListener(k, opts.on[k]);
    }
    for (const c of children) { if (c == null) continue; if (typeof c === "string") e.appendChild(document.createTextNode(c)); else e.appendChild(c); }
    return e;
  }
  function clear(n) { while (n.firstChild) n.removeChild(n.firstChild); }
  function fmtDateTR(iso) {
    const d = new Date(iso + "T12:00:00Z");
    return d.getUTCDate() + " " + AY_AD[d.getUTCMonth()] + " " + GUN_AD[d.getUTCDay()];
  }

  function renderError(msg) {
    clear(content);
    const card = el("div", { className: "status-card" });
    card.appendChild(el("div", { className: "status-icon err", text: "✗" }));
    card.appendChild(el("div", { text: msg, attrs: { style: "color:var(--muted); font-size:13px; line-height:1.6;" } }));
    content.appendChild(card);
  }

  function renderDecision(ctx) {
    clear(content);
    const eb = document.getElementById("eyebrow");
    if (ctx.status !== "pending") {
      const stateText = ctx.status === "approved" ? "Onaylandı" : ctx.status === "rejected" ? "Reddedildi" : ctx.status;
      const iconCls = ctx.status === "approved" ? "ok" : "err";
      const iconCh = ctx.status === "approved" ? "✓" : "✗";
      eb.textContent = "Ders Devri · " + stateText;

      const card = el("div", { className: "status-card" });
      card.appendChild(el("div", { className: "status-icon " + iconCls, text: iconCh }));
      card.appendChild(el("div", {
        attrs: { style: "font-size:15px;line-height:1.5;color:var(--muted);" },
        text: `${ctx.substitute.name}, ${fmtDateTR(ctx.absence.date)} ${ctx.lesson.bas} ${ctx.lesson.ad} dersini ${ctx.status === "approved" ? "onayladın" : "reddettin"}.`,
      }));
      if (ctx.respondedAt) {
        card.appendChild(el("div", {
          attrs: { style: "font-family:var(--font-mono); font-size:11px; color:var(--faint); margin-top:10px; letter-spacing:0.1em;" },
          text: new Date(ctx.respondedAt).toLocaleString("tr-TR"),
        }));
      }
      content.appendChild(card);
      return;
    }

    // Pending — show detail + buttons
    const head = el("h1", { className: "headline" });
    head.appendChild(document.createTextNode(ctx.substitute.name.split(" ")[0] + " hoca, "));
    head.appendChild(el("em", { text: "bir ders devri" }));
    head.appendChild(document.createTextNode(" var."));
    content.appendChild(head);

    const msg = el("p", { className: "message" });
    msg.appendChild(document.createTextNode(ctx.absent.name + " hoca o gün gelemiyor. Dersi sana devredildi. Kabul ediyor musun?"));
    content.appendChild(msg);

    const detail = el("div", { className: "detail" });
    function row(label, value, big) {
      const r = el("div", { className: "r" });
      r.appendChild(el("span", { className: "l", text: label }));
      r.appendChild(el("span", { className: "v" + (big ? " big" : ""), text: value }));
      detail.appendChild(r);
    }
    row("Tarih", fmtDateTR(ctx.absence.date));
    row("Saat", ctx.lesson.bas + "–" + ctx.lesson.bit);
    row("Ders", ctx.lesson.ad, true);
    if (ctx.lesson.lab) {
      const labName = { i: "İlkokul", O: "Ortaokul", L: "Lise" }[ctx.lesson.lab] || ctx.lesson.lab;
      row("Lab", labName + " Lab");
    }
    row("Devreden", ctx.absent.name);
    content.appendChild(detail);

    const btnRow = el("div", { className: "btn-row" });
    const approveBtn = el("button", { className: "btn btn-approve", text: "✓ Onayla", on: { click: () => decide("approve") } });
    const rejectBtn = el("button", { className: "btn btn-reject", text: "✗ Reddet", on: { click: () => decide("reject") } });
    btnRow.appendChild(approveBtn);
    btnRow.appendChild(rejectBtn);
    content.appendChild(btnRow);

    content.appendChild(el("div", {
      className: "footer-note",
      text: "Link 3 gün boyunca geçerli",
    }));

    async function decide(decision) {
      approveBtn.disabled = true;
      rejectBtn.disabled = true;
      const btn = decision === "approve" ? approveBtn : rejectBtn;
      btn.textContent = decision === "approve" ? "Gönderiliyor…" : "Gönderiliyor…";
      try {
        const res = await fetch("/api/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, decision }),
        });
        const data = await res.json();
        if (!res.ok) {
          renderError(data.error || "Bir hata oluştu");
          return;
        }
        ctx.status = data.status;
        ctx.respondedAt = new Date().toISOString();
        renderDecision(ctx);
      } catch (err) {
        renderError("Bağlantı hatası. Tekrar dene.");
      }
    }
  }

  async function load() {
    if (!token) return renderError("Geçersiz bağlantı: token bulunamadı.");
    try {
      const res = await fetch("/api/approve?token=" + encodeURIComponent(token));
      const data = await res.json();
      if (!res.ok) return renderError(data.error || "Bağlantı geçersiz.");
      renderDecision(data);

      // Auto-execute if email link has ?d=approve|reject
      if (autoDecision === "approve" || autoDecision === "reject") {
        if (data.status === "pending") {
          // Click the appropriate button automatically
          setTimeout(() => {
            const btn = document.querySelector(autoDecision === "approve" ? ".btn-approve" : ".btn-reject");
            if (btn) btn.click();
          }, 200);
        }
      }
    } catch (err) {
      renderError("Sunucuya ulaşılamadı.");
    }
  }

  load();
})();
</script>
</body>
</html>
