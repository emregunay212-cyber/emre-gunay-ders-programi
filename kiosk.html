<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#05070f" />
<title>Lab Kiosk · Bilnet Balıkesir BT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="assets/kiosk.css" />
</head>
<body>
<div class="kiosk">
  <header class="kiosk-header">
    <div class="kiosk-title">
      <h1>Bilişim Laboratuvarları</h1>
      <span class="sub">Canlı</span>
    </div>
    <div>
      <div class="kiosk-clock" id="kiosk-clock">--:--</div>
      <div class="kiosk-date" id="kiosk-date">—</div>
    </div>
  </header>

  <main class="labs-board" id="labs-board"></main>

  <footer class="kiosk-footer">
    <span>Bilnet Balıkesir · Bilişim Teknolojileri</span>
    <span>30 sn'de bir güncellenir</span>
  </footer>
</div>
<script src="assets/kiosk.js"></script>
</body>
</html>
