<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b10" />
<title>Lab Boş Zamanları · Bilnet Balıkesir BT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="assets/labs.css" />
</head>
<body>
<div class="page" id="page">

  <header class="labs-header">
    <a href="index.html" class="back-link" aria-label="Geri">←</a>
    <div class="title-block">
      <div class="eyebrow">Bilnet Balıkesir</div>
      <h1>Lab Boş Zamanları</h1>
    </div>
    <div class="clock-mini">
      <div class="c" id="clock">--:--:--</div>
      <div class="d" id="date">—</div>
    </div>
  </header>

  <nav class="lab-tabs" role="tablist" aria-label="Laboratuvar seç">
    <button class="lab-tab" data-lab="i" role="tab">
      <span class="mono-letter">İ</span>
      <span class="tab-info">
        <span class="tab-name">İlkokul Lab</span>
        <span class="tab-free">—</span>
      </span>
    </button>
    <button class="lab-tab" data-lab="O" role="tab">
      <span class="mono-letter">O</span>
      <span class="tab-info">
        <span class="tab-name">Ortaokul Lab</span>
        <span class="tab-free">—</span>
      </span>
    </button>
    <button class="lab-tab" data-lab="L" role="tab">
      <span class="mono-letter">L</span>
      <span class="tab-info">
        <span class="tab-name">Lise Lab</span>
        <span class="tab-free">—</span>
      </span>
    </button>
  </nav>

  <div class="lab-title" id="lab-title"></div>

  <main id="days"></main>

  <div class="page-foot">Sadece 30 dk ve üzeri boş slotlar · 09:00 – 17:00</div>
</div>

<script src="assets/data-emre.js"></script>
<script src="assets/data-halil.js"></script>
<script src="assets/data-imge.js"></script>
<script src="assets/data-yunus.js"></script>
<script src="assets/data-loader.js"></script>
<script src="assets/labs.js"></script>
</body>
</html>
