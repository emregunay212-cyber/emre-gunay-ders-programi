<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b10" />
<title>Admin Paneli · BT Ders Programı</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
<div class="shell" id="shell" style="display:none">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">ADMIN</span>
      <div>
        <div class="brand-name">BT Ders Programı</div>
        <div class="brand-sub" id="kvStatus">bağlanıyor…</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="clock-mono" id="topbar-clock">--:--:--</span>
      <a href="index.html" class="btn-ghost">↗ Siteye</a>
      <button class="btn-logout" id="logout-btn">Çıkış</button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-panel="teachers" role="tab">Öğretmenler <span class="count" id="cnt-t">0</span></button>
    <button class="tab" data-panel="lessons" role="tab">Dersler <span class="count" id="cnt-l">0</span></button>
    <button class="tab" data-panel="absences" role="tab">Yoklama <span class="count" id="cnt-a">0</span></button>
    <button class="tab" data-panel="analytics" role="tab">Analiz</button>
  </nav>

  <!-- TEACHERS PANEL -->
  <section class="panel active" id="panel-teachers" role="tabpanel">
    <div class="panel-header">
      <div class="panel-title">Öğretmenler<small>Ekle · düzenle · sil</small></div>
      <button class="btn btn-primary" id="btn-add-teacher">+ Yeni öğretmen</button>
    </div>
    <div id="teachers-area" class="loading">Yükleniyor…</div>
  </section>

  <!-- LESSONS PANEL -->
  <section class="panel" id="panel-lessons" role="tabpanel">
    <div class="panel-header">
      <div class="panel-title">Dersler<small>Öğretmen seç, dersini yönet</small></div>
      <button class="btn btn-primary" id="btn-add-lesson">+ Yeni ders</button>
    </div>
    <div id="lessons-area" class="loading">Yükleniyor…</div>
  </section>

  <!-- ABSENCES PANEL -->
  <section class="panel" id="panel-absences" role="tabpanel">
    <div class="panel-header">
      <div class="panel-title">Yoklama<small>Gelmeyen öğretmenin derslerini devret</small></div>
    </div>
    <div id="absences-area" class="loading">Yükleniyor…</div>
  </section>

  <!-- ANALYTICS PANEL -->
  <section class="panel" id="panel-analytics" role="tabpanel">
    <div class="panel-header">
      <div class="panel-title">Analiz<small>Doluluk · çakışma · özet</small></div>
    </div>
    <div id="analytics-area" class="loading">Yükleniyor…</div>
  </section>

</div>

<div class="toast-host" id="toast-host"></div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<script src="assets/admin.js"></script>
</body>
</html>
